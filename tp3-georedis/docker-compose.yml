version: '3.8'
services:
  redis:
    image: redis:alpine
    container_name: redis_geo
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: api_turismo
    ports:
      - "5000:5000"
    depends_on:
      - redis

  frontend:
    build: ./frontend
    container_name: web_turismo
    ports:
      - "8080:80"
    depends_on:
      - backend
